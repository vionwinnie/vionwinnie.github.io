<!-- Axis 5: Eval Loss (linear: 3.5 to 11.0) -->
<!-- y = 380 - (loss - 3.5) / 7.5 * 295 -->
<line x1="741" y1="380" x2="745" y2="380" stroke="#bbb" stroke-width="0.5"/>
