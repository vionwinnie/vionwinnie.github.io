<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
<defs>
  <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#ffffff"/>
    <stop offset="100%" stop-color="#fafbfc"/>
  </linearGradient>
</defs>
<rect width="800" height="420" fill="url(#bgGrad)"/>
<style>
  text { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
</style>

<!-- Title and subtitle -->
<text x="400" y="24" text-anchor="middle" font-size="14" font-weight="600" fill="#333">Hyperparameter Search — Parallel Coordinates</text>
<text x="400" y="39" text-anchor="middle" font-size="10" fill="#999">20 Optuna trials, colored by eval loss</text>

<!-- Legend -->
<rect x="80" y="52" width="10" height="3" rx="1" fill="#76b900" opacity="0.9"/>
<text x="94" y="56" font-size="8.5" fill="#555">Best (&lt;3.8)</text>
<rect x="170" y="52" width="10" height="3" rx="1" fill="#0073e6" opacity="0.7"/>
<text x="184" y="56" font-size="8.5" fill="#555">Good (3.8–4.1)</text>
<rect x="270" y="52" width="10" height="3" rx="1" fill="#94a3b8" opacity="0.4"/>
<text x="284" y="56" font-size="8.5" fill="#555">Poor (4.1–7.0)</text>
<rect x="370" y="52" width="10" height="3" rx="1" fill="#cbd5e1" opacity="0.3"/>
<text x="384" y="56" font-size="8.5" fill="#555">Bad (&gt;7.0)</text>

<!-- Plot area: x=80..740, y=85..380 -->
<!-- 5 axes at x = 80, 245, 410, 575, 740 -->
<!-- Axis height: y=85 (top) to y=380 (bottom) — total 295px -->

<!-- Subtle plot background -->
<rect x="80" y="85" width="660" height="295" fill="#fafafa" stroke="#e8e8e8" stroke-width="0.5" rx="1"/>

<!-- Axis lines -->
<line x1="80" y1="85" x2="80" y2="380" stroke="#ddd" stroke-width="1"/>
<line x1="245" y1="85" x2="245" y2="380" stroke="#ddd" stroke-width="1"/>
<line x1="410" y1="85" x2="410" y2="380" stroke="#ddd" stroke-width="1"/>
<line x1="575" y1="85" x2="575" y2="380" stroke="#ddd" stroke-width="1"/>
<line x1="740" y1="85" x2="740" y2="380" stroke="#ddd" stroke-width="1"/>

<!-- Axis titles -->
<text x="80" y="78" text-anchor="middle" font-size="11" fill="#555" font-weight="500">Learning Rate</text>
<text x="245" y="78" text-anchor="middle" font-size="11" fill="#555" font-weight="500">Batch Size</text>
<text x="410" y="78" text-anchor="middle" font-size="11" fill="#555" font-weight="500">Grad. Accum.</text>
<text x="575" y="78" text-anchor="middle" font-size="11" fill="#555" font-weight="500">LoRA Rank</text>
<text x="740" y="78" text-anchor="middle" font-size="11" fill="#555" font-weight="500">Eval Loss</text>

<!-- Axis 1: Learning Rate (log scale: 1e-5 to 5e-4) -->
<!-- log10(1e-5)=-5, log10(5e-4)=-3.301 => range 1.699 -->
<!-- y = 380 - (log10(lr) - (-5)) / 1.699 * 295 -->
<line x1="76" y1="380" x2="84" y2="380" stroke="#bbb" stroke-width="0.5"/>
<text x="75" y="383" text-anchor="end" font-size="9" fill="#999">1e-5</text>
<line x1="76" y1="328" x2="84" y2="328" stroke="#bbb" stroke-width="0.5"/>
<text x="75" y="331" text-anchor="end" font-size="9" fill="#999">2e-5</text>
<line x1="76" y1="254" x2="84" y2="254" stroke="#bbb" stroke-width="0.5"/>
<text x="75" y="257" text-anchor="end" font-size="9" fill="#999">5e-5</text>
<line x1="76" y1="206" x2="84" y2="206" stroke="#bbb" stroke-width="0.5"/>
