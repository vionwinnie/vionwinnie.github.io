<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 350" width="1200" height="350" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <filter id="shadowStrong" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0073e6"/>
    </marker>
    <marker id="arrowBranch" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 8 3, 0 6" fill="#6366f1"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="350" rx="0" fill="#f8f8f8"/>

  <!-- ============================================================ -->
  <!-- MAIN FLOW ARROWS                                              -->
  <!-- ============================================================ -->

  <!-- Arrow: Video Gen -> Frame Extraction -->
  <line x1="168" y1="100" x2="186" y2="100" stroke="#0073e6" stroke-width="2.2" marker-end="url(#arrowBlue)"/>
  <!-- Arrow: Frame Extraction -> Auto Review -->
  <line x1="340" y1="100" x2="358" y2="100" stroke="#0073e6" stroke-width="2.2" marker-end="url(#arrowBlue)"/>
  <!-- Arrow: Auto Review -> Human Feedback -->
  <line x1="520" y1="100" x2="538" y2="100" stroke="#0073e6" stroke-width="2.2" marker-end="url(#arrowBlue)"/>
  <!-- Arrow: Human Feedback -> Quality Filtering -->
  <line x1="700" y1="100" x2="718" y2="100" stroke="#0073e6" stroke-width="2.2" marker-end="url(#arrowBlue)"/>
  <!-- Arrow: Quality Filtering -> Final Dataset -->
  <line x1="880" y1="100" x2="908" y2="100" stroke="#0073e6" stroke-width="2.2" marker-end="url(#arrowBlue)"/>

  <!-- Branch arrow: Video Gen down to Image Optimization -->
  <path d="M 107 140 L 107 210 L 107 238" stroke="#6366f1" stroke-width="1.8" fill="none" stroke-dasharray="6,3" marker-end="url(#arrowBranch)"/>

  <!-- ============================================================ -->
  <!-- STEP 1: Cosmos-Predict2.5-2B (Video Generation)              -->
  <!-- ============================================================ -->
  <g transform="translate(14, 44)">
    <rect width="152" height="112" rx="12" fill="#ecfdf5" stroke="#059669" stroke-width="1.8" filter="url(#shadow)"/>
    <rect x="12" y="12" width="20" height="14" rx="3" fill="#059669" opacity="0.2"/>
    <circle cx="37" cy="19" r="3.5" fill="#059669" opacity="0.2"/>
    <text x="76" y="24" text-anchor="middle" fill="#059669" font-size="9" font-weight="600" letter-spacing="0.5">VIDEO GENERATION</text>
    <line x1="12" y1="33" x2="140" y2="33" stroke="#059669" stroke-width="0.5" opacity="0.3"/>
    <text x="76" y="52" text-anchor="middle" fill="#065f46" font-size="11" font-weight="700">Cosmos-Predict</text>
    <text x="76" y="66" text-anchor="middle" fill="#065f46" font-size="11" font-weight="700">2.5-2B</text>
    <text x="76" y="86" text-anchor="middle" fill="#065f46" font-size="20" font-weight="800">106</text>
    <text x="76" y="102" text-anchor="middle" fill="#065f46" font-size="10" opacity="0.75">videos generated</text>
  </g>

  <!-- ============================================================ -->
  <!-- STEP 2: Frame Extraction                                     -->
  <!-- ============================================================ -->
  <g transform="translate(190, 48)">
    <rect width="148" height="104" rx="12" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.8" filter="url(#shadow)"/>
    <rect x="12" y="11" width="7" height="5" rx="1" fill="#0284c7" opacity="0.25"/>
    <rect x="21" y="11" width="7" height="5" rx="1" fill="#0284c7" opacity="0.25"/>
    <rect x="30" y="11" width="7" height="5" rx="1" fill="#0284c7" opacity="0.25"/>
    <rect x="12" y="18" width="7" height="5" rx="1" fill="#0284c7" opacity="0.25"/>
    <rect x="21" y="18" width="7" height="5" rx="1" fill="#0284c7" opacity="0.25"/>
    <text x="74" y="22" text-anchor="middle" fill="#0284c7" font-size="9" font-weight="600" letter-spacing="0.5">FRAME EXTRACTION</text>
    <line x1="12" y1="30" x2="136" y2="30" stroke="#0284c7" stroke-width="0.5" opacity="0.3"/>
    <text x="74" y="49" text-anchor="middle" fill="#0c4a6e" font-size="12" font-weight="600">5 frames / video</text>
    <text x="74" y="70" text-anchor="middle" fill="#0c4a6e" font-size="20" font-weight="800">530</text>
    <text x="74" y="88" text-anchor="middle" fill="#0c4a6e" font-size="10" opacity="0.75">raw frames</text>
  </g>

  <!-- ============================================================ -->
  <!-- STEP 3: Auto Review (Cosmos-Reason2-2B)                      -->
  <!-- ============================================================ -->
  <g transform="translate(362, 48)">
    <rect width="156" height="104" rx="12" fill="#f0f4ff" stroke="#6366f1" stroke-width="1.8" filter="url(#shadow)"/>
    <!-- Icon: AI brain -->
    <circle cx="22" cy="18" r="7" fill="#6366f1" opacity="0.15" stroke="#6366f1" stroke-width="0.8"/>
    <text x="78" y="22" text-anchor="middle" fill="#6366f1" font-size="9" font-weight="600" letter-spacing="0.5">AUTO REVIEW</text>
    <line x1="12" y1="30" x2="144" y2="30" stroke="#6366f1" stroke-width="0.5" opacity="0.3"/>
    <text x="78" y="48" text-anchor="middle" fill="#312e81" font-size="10" font-weight="600">Cosmos-Reason2-2B</text>
    <text x="78" y="63" text-anchor="middle" fill="#312e81" font-size="10">zero-shot analysis</text>
    <text x="78" y="82" text-anchor="middle" fill="#312e81" font-size="10" font-weight="600">model_analysis.json</text>
    <text x="78" y="96" text-anchor="middle" fill="#312e81" font-size="9" opacity="0.7">baseline predictions</text>
  </g>

  <!-- ============================================================ -->
  <!-- STEP 4: Human Feedback                                       -->
  <!-- ============================================================ -->
  <g transform="translate(542, 48)">
    <rect width="156" height="104" rx="12" fill="#fefce8" stroke="#ca8a04" stroke-width="1.8" filter="url(#shadow)"/>
    <!-- Icon: star -->
    <polygon points="20,20 22,15 24,20 29,20 25,24 26.5,29 22,26 17.5,29 19,24 15,20" fill="#ca8a04" opacity="0.25" transform="scale(0.65) translate(6,6)"/>
    <text x="78" y="22" text-anchor="middle" fill="#ca8a04" font-size="9" font-weight="600" letter-spacing="0.5">HUMAN FEEDBACK</text>
    <line x1="12" y1="30" x2="144" y2="30" stroke="#ca8a04" stroke-width="0.5" opacity="0.3"/>
    <text x="78" y="49" text-anchor="middle" fill="#713f12" font-size="12" font-weight="600">Rating 1-5 scale</text>
    <text x="78" y="67" text-anchor="middle" fill="#713f12" font-size="13" font-weight="700">~35 videos</text>
    <text x="78" y="82" text-anchor="middle" fill="#713f12" font-size="13" font-weight="700">removed</text>
    <text x="78" y="96" text-anchor="middle" fill="#713f12" font-size="9" opacity="0.7">label corrections</text>
  </g>

  <!-- ============================================================ -->
  <!-- STEP 5: Quality Filtering                                    -->
  <!-- ============================================================ -->
  <g transform="translate(722, 52)">
    <rect width="156" height="96" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="1.8" filter="url(#shadow)"/>
    <!-- Icon: funnel -->
    <polygon points="14,13 32,13 28,20 18,20" fill="#ea580c" opacity="0.2"/>
    <rect x="21" y="20" width="5" height="5" fill="#ea580c" opacity="0.2"/>
    <text x="78" y="22" text-anchor="middle" fill="#ea580c" font-size="9" font-weight="600" letter-spacing="0.5">QUALITY FILTERING</text>
    <line x1="12" y1="30" x2="144" y2="30" stroke="#ea580c" stroke-width="0.5" opacity="0.3"/>
    <text x="78" y="48" text-anchor="middle" fill="#7c2d12" font-size="10" font-weight="600">Camera shifts removed</text>
    <text x="78" y="62" text-anchor="middle" fill="#7c2d12" font-size="10" font-weight="600">Wrong perspective</text>
    <text x="78" y="76" text-anchor="middle" fill="#7c2d12" font-size="10" font-weight="600">Early frames removed</text>
    <text x="78" y="90" text-anchor="middle" fill="#7c2d12" font-size="9" opacity="0.65">25 samples cut</text>
  </g>

  <!-- ============================================================ -->
  <!-- STEP 6: Final Dataset                                        -->
  <!-- ============================================================ -->
  <g transform="translate(912, 36)">
    <rect width="180" height="128" rx="12" fill="#f0ffd6" stroke="#76b900" stroke-width="2.2" filter="url(#shadowStrong)"/>
    <circle cx="24" cy="20" r="8" fill="#76b900" opacity="0.15"/>
    <polyline points="19,20 22,23 29,16" stroke="#76b900" stroke-width="2" fill="none" opacity="0.5"/>
    <text x="90" y="24" text-anchor="middle" fill="#76b900" font-size="9" font-weight="700" letter-spacing="0.5">FINAL DATASET</text>
    <line x1="12" y1="33" x2="168" y2="33" stroke="#76b900" stroke-width="0.5" opacity="0.3"/>
    <text x="90" y="62" text-anchor="middle" fill="#3d5e00" font-size="30" font-weight="800">264</text>
    <text x="90" y="80" text-anchor="middle" fill="#3d5e00" font-size="12" font-weight="600">curated samples</text>
    <line x1="30" y1="90" x2="150" y2="90" stroke="#76b900" stroke-width="0.5" opacity="0.25"/>
    <text x="90" y="107" text-anchor="middle" fill="#3d5e00" font-size="11" opacity="0.8">from</text>
    <text x="90" y="122" text-anchor="middle" fill="#3d5e00" font-size="15" font-weight="700">66 scenarios</text>
  </g>

  <!-- ============================================================ -->
  <!-- FUNNEL EFFECT: counts along the top                          -->
  <!-- ============================================================ -->
  <text x="264" y="36" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="500">530</text>
  <text x="310" y="36" text-anchor="middle" fill="#94a3b8" font-size="9">&#8594;</text>
  <text x="440" y="38" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="500">530</text>
  <text x="490" y="38" text-anchor="middle" fill="#94a3b8" font-size="9">&#8594;</text>
  <text x="620" y="40" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="500">~355</text>
  <text x="670" y="40" text-anchor="middle" fill="#94a3b8" font-size="9">&#8594;</text>
  <text x="800" y="42" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="500">~330</text>
  <text x="850" y="42" text-anchor="middle" fill="#94a3b8" font-size="9">&#8594;</text>
  <text x="1002" y="28" text-anchor="middle" fill="#76b900" font-size="10" font-weight="600">264</text>

  <!-- ============================================================ -->
  <!-- BRANCH: Image Optimization (below Video Generation)          -->
  <!-- ============================================================ -->
  <g transform="translate(14, 246)">
    <rect width="220" height="82" rx="10" fill="#f0f4ff" stroke="#6366f1" stroke-width="1.4" filter="url(#shadow)" stroke-dasharray="4,2"/>
    <rect x="12" y="11" width="13" height="9" rx="2" fill="#6366f1" opacity="0.15" stroke="#6366f1" stroke-width="0.8"/>
    <polyline points="20,20 26,14" stroke="#6366f1" stroke-width="1" fill="none" opacity="0.4"/>
    <text x="110" y="22" text-anchor="middle" fill="#6366f1" font-size="9" font-weight="600" letter-spacing="0.5">IMAGE OPTIMIZATION</text>
    <line x1="12" y1="30" x2="208" y2="30" stroke="#6366f1" stroke-width="0.4" opacity="0.3"/>
    <text x="110" y="50" text-anchor="middle" fill="#312e81" font-size="12" font-weight="600">
      <tspan>1280&#215;720</tspan>
      <tspan fill="#6366f1" font-size="11"> &#8594; </tspan>
      <tspan font-weight="700">400&#215;400</tspan>
    </text>
    <text x="110" y="70" text-anchor="middle" fill="#312e81" font-size="14" font-weight="800">3&#215; <tspan font-size="11" font-weight="600">token efficiency</tspan></text>
  </g>

  <!-- Branch label -->
  <text x="80" y="230" text-anchor="start" fill="#6366f1" font-size="9" font-style="italic" opacity="0.7">frame preprocessing</text>

</svg>
